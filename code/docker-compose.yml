version: '3.8'
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-magical-bedtime-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    stdin_open: true
    tty: true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-magical-bedtime-backend
    ports:
      - "5500:5500"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5500
      - CORS_ORIGIN=http://localhost:5173
    stdin_open: true
    tty: true

  # Backend Testing
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my-magical-bedtime-backend-test
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - OPENAI_API_KEY=dummy-key-for-testing
    command: npm test
    profiles:
      - test

  # Frontend Testing
  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-magical-bedtime-frontend-test
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
    command: npm test
    profiles:
      - test
