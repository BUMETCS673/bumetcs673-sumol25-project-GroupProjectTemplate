name: CI/CD - Build, Test, and Deploy MERN Stack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build and Test Frontend & Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21
          
      # Cache dependencies for both frontend and backend
      - name: Cache Backend Dependencies
        uses: actions/cache@v3
        with:
          path: code/backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('code/backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-
            
      - name: Cache Frontend Dependencies
        uses: actions/cache@v3
        with:
          path: code/frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('code/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-
            
      # Install and test backend
      - name: Install Backend Dependencies
        working-directory: ./code/backend
        run: npm install
        
      - name: Test Backend
        working-directory: ./code/backend
        run: |
          if npm run test; then
            echo "Backend tests passed"
          else
            echo "Backend tests failed"
            exit 1
          fi
          
      # Install, build, and test frontend
      - name: Install Frontend Dependencies
        working-directory: ./code/frontend
        run: npm install
        
      - name: Build Frontend
        working-directory: ./code/frontend
        run: npm run build
        
      - name: Test Frontend
        working-directory: ./code/frontend
        run: |
          if npm run test; then
            echo "Frontend tests passed"
          else
            echo "Frontend tests failed"
            exit 1
          fi

  check-backend-changes:
    name: Check for Backend Changes
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.changes.outputs.backend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Check for changes in backend
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'code/backend/**'

  deploy-backend:
    name: Deploy Backend to Heroku
    runs-on: ubuntu-latest
    needs: [build-and-test, check-backend-changes]
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' && 
      needs.check-backend-changes.outputs.backend-changed == 'true'
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # Method 1: Using git subtree (most reliable)
      - name: Deploy Backend to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          # Add Heroku remote
          git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/mymagicalbedtime.git
          
          # Deploy only the backend subdirectory
          git subtree push --prefix code/backend heroku main
          
      - name: Verify Backend Deployment
        run: |
          echo "✅ Backend deployment completed successfully!"
          echo "🌐 Backend API URL: https://mymagicalbedtime-25abceb2c11f.herokuapp.com/"
          
